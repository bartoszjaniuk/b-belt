name: Release

# Uruchomienie: push tagu "release" lub "release-*" (np. git tag release && git push origin release).
# semantic-release działa na branchu main i sam tworzy tag wersji (v0.0.2) oraz publikuje na npm.
on:
  push:
    tags:
      - "release"
      - "release-*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install peer dependencies
        run: npm install axios --no-save

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_REF: refs/heads/main
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
