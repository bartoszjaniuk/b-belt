name: Release Pipeline

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build, Test and Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Kluczowe: pobiera pełną historię git, aby commit-analyzer zadziałał poprawnie

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # npm ci to najlepsza praktyka w CI/CD, instaluje paczki dokładnie z package-lock.json
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Domyślny token dostarczany przez GitHub Actions
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # Twój Automation Token z npm, dodany w Settings -> Secrets
        run: npx semantic-release
