name: Release

# Każdy push na main uruchamia release. semantic-release analizuje commity (Conventional Commits)
# i sam bumpuje wersję: feat: → minor, fix: → patch, BREAKING CHANGE → major.
on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install peer dependencies
        run: npm install axios --no-save

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
